<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>OvaTrack – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --rose:#e8537a;--rose-light:#f9dde5;--plum:#3d1f4e;--plum-mid:#5c3272;
      --cream:#fdf7f2;--text:#2a1a30;--muted:#7a6882;--border:#e8ddef;
    }
    body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;
      display:flex;align-items:center;justify-content:center;padding:20px}
    body::before{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;
      background:radial-gradient(circle,rgba(232,83,122,.12) 0%,transparent 70%);pointer-events:none;z-index:0}
    body::after{content:'';position:fixed;bottom:-150px;left:-150px;width:500px;height:500px;
      background:radial-gradient(circle,rgba(92,50,114,.10) 0%,transparent 70%);pointer-events:none;z-index:0}
    .card{position:relative;z-index:5;width:100%;max-width:420px;background:#fff;
      border-radius:24px;border:1px solid var(--border);box-shadow:0 8px 40px rgba(61,31,78,.10);
      overflow:hidden}
    .card-top{padding:36px 36px 28px;background:linear-gradient(135deg,rgba(232,83,122,.06),rgba(92,50,114,.06));
      border-bottom:1px solid var(--border);text-align:center}
    .logo-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--rose),var(--plum-mid));
      border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;
      margin:0 auto 14px}
    h1{font-family:'DM Serif Display',serif;font-size:26px;color:var(--plum);margin-bottom:4px}
    .sub{font-size:13px;color:var(--muted)}
    .card-body{padding:28px 36px 36px}
    .success-msg{background:#d4f0e5;color:#166534;border:1px solid #86efac;border-radius:10px;
      padding:12px 16px;font-size:13px;margin-bottom:16px;text-align:center}
    .error-msg{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:10px;
      padding:12px 16px;font-size:13px;margin-bottom:16px;text-align:center}
    .field{margin-bottom:18px}
    label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;
      letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
    input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;
      font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:#fff9f5;
      outline:none;transition:all .2s}
    input:focus{border-color:var(--rose);background:#fff;box-shadow:0 0 0 3px rgba(232,83,122,.1)}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--rose),var(--plum-mid));
      color:#fff;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;
      font-weight:600;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(232,83,122,.3)}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(232,83,122,.4)}
    .footer-link{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
    .footer-link a{color:var(--rose);text-decoration:none;font-weight:500}
    .footer-link a:hover{text-decoration:underline}
    .lang-row{display:flex;justify-content:center;gap:6px;margin-top:16px}
    .lang-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);
      background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
    .lang-btn.active{background:var(--plum);color:#fff;border-color:var(--plum)}
  </style>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="logo-icon">🌸</div>
    <h1 data-en="Welcome Back" data-hi="वापस स्वागत है">Welcome Back</h1>
    <p class="sub" data-en="Sign in to your OvaTrack account" data-hi="अपने OvaTrack खाते में साइन इन करें">Sign in to your OvaTrack account</p>
    <div class="lang-row">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('hi')">हिं</button>
    </div>
  </div>
  <div class="card-body">
    {% if registered %}
      <div class="success-msg">✅ Account created! Please sign in.</div>
    {% endif %}
    {% if error %}
      <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="field">
        <label data-en="Email Address" data-hi="ईमेल पता">Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="field">
        <label data-en="Password" data-hi="पासवर्ड">Password</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn" data-en="Sign In →" data-hi="साइन इन करें →">Sign In →</button>
    </form>
    <div class="footer-link">
      <span data-en="Don't have an account?" data-hi="खाता नहीं है?">Don't have an account?</span>
      <a href="/register" data-en="Create one" data-hi="बनाएं">Create one</a>
    </div>
  </div>
</div>
<script>
function setLang(lang){
  document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active',i===(lang==='en'?0:1)));
  document.querySelectorAll('[data-en]').forEach(el=>{
    const t=el.getAttribute('data-'+lang);
    if(t) el.textContent=t;
  });
}
</script>
</body>
</html>
