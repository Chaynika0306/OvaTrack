<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>OvaTrack – Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;
      justify-content:center;padding:20px;background:#fdf7f2}
    body::before{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;
      background:radial-gradient(circle,rgba(232,83,122,.10) 0%,transparent 70%);pointer-events:none;z-index:0}
    .card{position:relative;z-index:5;width:100%;max-width:420px;background:#fff;
      border-radius:24px;border:1px solid #e8ddef;box-shadow:0 8px 40px rgba(61,31,78,.10);overflow:hidden}
    .card-top{padding:32px 36px 24px;background:linear-gradient(135deg,rgba(232,83,122,.06),rgba(92,50,114,.06));
      border-bottom:1px solid #e8ddef;text-align:center}
    .logo-icon{width:52px;height:52px;background:linear-gradient(135deg,#e8537a,#5c3272);
      border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px}
    h1{font-family:'DM Serif Display',serif;font-size:24px;color:#3d1f4e;margin-bottom:4px}
    .sub{font-size:13px;color:#7a6882;line-height:1.5}
    .email-chip{display:inline-block;background:#f9dde5;color:#c23d62;padding:4px 12px;
      border-radius:50px;font-size:12px;font-weight:600;margin-top:8px}
    .card-body{padding:24px 36px 32px}
    .error-msg{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;border-radius:10px;
      padding:12px 16px;font-size:13px;margin-bottom:16px;text-align:center}
    .field{margin-bottom:18px}
    label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;
      letter-spacing:.6px;color:#7a6882;margin-bottom:6px}
    input{width:100%;padding:12px 16px;border:1.5px solid #e8ddef;border-radius:12px;
      font-family:'DM Sans',sans-serif;font-size:15px;color:#2a1a30;background:#fff9f5;
      outline:none;transition:all .2s}
    input:focus{border-color:#e8537a;background:#fff;box-shadow:0 0 0 3px rgba(232,83,122,.10)}
    /* OTP input special style */
    #otp{font-size:24px;font-weight:700;letter-spacing:8px;text-align:center;color:#3d1f4e}
    .hint{font-size:11px;color:#7a6882;margin-top:4px}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,#e8537a,#5c3272);
      color:#fff;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:15px;
      font-weight:600;cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(232,83,122,.30)}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(232,83,122,.40)}
    .footer-link{text-align:center;margin-top:16px;font-size:13px;color:#7a6882}
    .footer-link a{color:#e8537a;text-decoration:none;font-weight:500}
    .timer{text-align:center;font-size:12px;color:#7a6882;margin-top:8px}
    .timer span{color:#e8537a;font-weight:600}
    
  </style>
<script>
// ── Global Theme & Language Persistence (OvaTrack) ─────────────────────
(function(){
  // Theme
  var th = localStorage.getItem('ova-theme');
  if(th) document.documentElement.setAttribute('data-theme', th);

  // Language — apply after DOM loads
  document.addEventListener('DOMContentLoaded', function(){
    var lang = localStorage.getItem('ova-lang') || 'en';
    document.querySelectorAll('[data-en]').forEach(function(el){
      var txt = el.getAttribute('data-'+lang);
      if(txt) el.innerHTML = txt;
    });
    // Sync lang buttons if they exist
    document.querySelectorAll('.lang-btn').forEach(function(b, i){
      b.classList.toggle('active', (lang==='en' && i===0)||(lang==='hi' && i===1));
    });
  });
})();
</script>
</head>
<body>
<div class="card">
  <div class="card-top">
    <div class="logo-icon">🔐</div>
    <h1>Enter OTP</h1>
    <p class="sub">We sent a 6-digit code to</p>
    <div class="email-chip">{{ email }}</div>
  </div>
  <div class="card-body">
    {% if error %}
      <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>6-Digit OTP</label>
        <input type="text" id="otp" name="otp" required maxlength="6" placeholder="000000"
               pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code" autofocus>
        <div class="hint">⏱ OTP expires in 10 minutes</div>
      </div>

      <div class="field">
        <label>New Password</label>
        <input type="password" name="new_password" required placeholder="Min. 6 characters">
      </div>

      <div class="field">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" required placeholder="Re-enter password">
      </div>

      <button type="submit" class="btn">Reset Password →</button>
    </form>

    <div class="timer" id="timer">OTP valid for <span id="countdown">10:00</span></div>

    <div class="footer-link">
      Didn't get the OTP? <a href="/forgot-password">Request again</a>
    </div>
  </div>
</div>

<script>
// Countdown timer
let seconds = 600;
const el = document.getElementById('countdown');
const t = setInterval(() => {
  seconds--;
  if (seconds <= 0) {
    clearInterval(t);
    el.textContent = 'Expired';
    el.style.color = '#dc2626';
    return;
  }
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
}, 1000);

// Auto format OTP input
document.getElementById('otp').addEventListener('input', function() {
  this.value = this.value.replace(/\D/g, '').slice(0, 6);
});
</script>
</body>
</html>
