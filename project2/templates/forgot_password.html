<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>OvaTrack – Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --rose:#e8537a; --rose-light:#f9dde5; --plum:#3d1f4e; --plum-mid:#5c3272;
      --bg:#fdf7f2; --bg2:#ffffff; --text:#2a1a30; --muted:#7a6882;
      --border:#e8ddef; --input-bg:#fff9f5;
      --card-shadow:0 8px 40px rgba(61,31,78,.10);
      --blob1:rgba(232,83,122,.10);
      --card-top-bg:linear-gradient(135deg,rgba(232,83,122,.06),rgba(92,50,114,.06));
      --info-bg:#e0f5f1; --info-border:#3bbfa3; --info-color:#0f6e56;
    }
    [data-theme="dark"]{
      --bg:#111827; --bg2:#1f2937; --text:#f3f4f6; --muted:#9ca3af;
      --border:#374151; --input-bg:#111827; --rose-light:#4a1525;
      --card-shadow:0 8px 40px rgba(0,0,0,.4);
      --blob1:rgba(232,83,122,.05);
      --card-top-bg:linear-gradient(135deg,rgba(232,83,122,.12),rgba(92,50,114,.12));
      --info-bg:#0d2520; --info-border:#2a9980; --info-color:#3bbfa3;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:20px;transition:background .3s,color .3s}
    body::before{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;
      background:radial-gradient(circle,var(--blob1) 0%,transparent 70%);pointer-events:none;z-index:0}
    .card{position:relative;z-index:5;width:100%;max-width:420px;background:var(--bg2);
      border-radius:24px;border:1px solid var(--border);box-shadow:var(--card-shadow);
      overflow:hidden;transition:background .3s,border-color .3s}
    .card-top{padding:36px 36px 28px;background:var(--card-top-bg);
      border-bottom:1px solid var(--border);text-align:center;transition:border-color .3s}
    .logo-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--rose),var(--plum-mid));
      border-radius:16px;display:flex;align-items:center;justify-content:center;
      font-size:24px;margin:0 auto 14px}
    h1{font-family:'DM Serif Display',serif;font-size:24px;color:var(--text);
      margin-bottom:4px;transition:color .3s}
    .sub{font-size:13px;color:var(--muted);line-height:1.6;transition:color .3s}
    .lang-row{display:flex;justify-content:center;gap:6px;margin-top:14px}
    .lang-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);
      background:transparent;color:var(--muted);font-size:12px;cursor:pointer;
      font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s}
    .lang-btn.active{background:var(--plum);color:#fff;border-color:var(--plum)}
    .card-body{padding:28px 36px 36px}
    .error-msg{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5;
      border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:16px;text-align:center}
    [data-theme="dark"] .error-msg{background:#3b0d0d;color:#fca5a5;border-color:#7f1d1d}
    .info-box{background:var(--info-bg);border:1px solid var(--info-border);border-radius:10px;
      padding:12px 16px;font-size:13px;color:var(--info-color);margin-bottom:18px;
      line-height:1.6;transition:all .3s}
    .field{margin-bottom:18px}
    label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;
      letter-spacing:.6px;color:var(--muted);margin-bottom:6px;transition:color .3s}
    input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;
      font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);
      background:var(--input-bg);outline:none;transition:all .2s}
    input:focus{border-color:var(--rose);background:var(--bg2);
      box-shadow:0 0 0 3px rgba(232,83,122,.1)}
    input::placeholder{color:var(--muted);opacity:.7}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--rose),var(--plum-mid));
      color:#fff;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;
      font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;
      box-shadow:0 4px 20px rgba(232,83,122,.3)}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(232,83,122,.4)}
    .footer-link{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
    .footer-link a{color:var(--rose);text-decoration:none;font-weight:500}
    .theme-toggle{position:fixed;top:16px;right:16px;z-index:999;width:40px;height:40px;
      border-radius:50%;border:1.5px solid var(--border);background:var(--bg2);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      font-size:18px;transition:all .25s;box-shadow:0 2px 10px rgba(0,0,0,.1)}
    .theme-toggle:hover{border-color:var(--rose);transform:scale(1.1)}
  </style>
  <script>
    (function(){
      var th = localStorage.getItem('ova-theme');
      if(th) document.documentElement.setAttribute('data-theme', th);
    })();
  </script>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>

<div class="card">
  <div class="card-top">
    <div class="logo-icon">🌸</div>
    <h1 data-en="Forgot Password" data-hi="पासवर्ड भूल गए">Forgot Password</h1>
    <p class="sub"
       data-en="Enter your registered email address. We'll send you a 6-digit OTP to reset your password."
       data-hi="अपना पंजीकृत ईमेल पता दर्ज करें। हम आपको पासवर्ड रीसेट के लिए 6 अंकों का OTP भेजेंगे।">
      Enter your registered email address. We'll send you a 6-digit OTP to reset your password.
    </p>
    <div class="lang-row">
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-hi" onclick="setLang('hi')">हिं</button>
    </div>
  </div>
  <div class="card-body">
    {% if error %}
      <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <div class="info-box"
         data-en="📧 An OTP will be sent to your email from <strong>ovatrack9903@gmail.com</strong>. Check your inbox (and spam folder)."
         data-hi="📧 OTP आपके ईमेल पर <strong>ovatrack9903@gmail.com</strong> से भेजा जाएगा। अपना इनबॉक्स (और स्पैम फ़ोल्डर) चेक करें।">
      📧 An OTP will be sent to your email from <strong>ovatrack9903@gmail.com</strong>. Check your inbox (and spam folder).
    </div>

    <form method="POST">
      <div class="field">
        <label data-en="Email Address" data-hi="ईमेल पता">Email Address</label>
        <input type="email" name="email" required autofocus
               placeholder="you@example.com"
               data-ph-en="you@example.com"
               data-ph-hi="you@example.com">
      </div>
      <button type="submit" class="btn"
              data-en="Send OTP →"
              data-hi="OTP भेजें →">Send OTP →</button>
    </form>

    <div class="footer-link">
      <span data-en="Remember your password?" data-hi="पासवर्ड याद है?">Remember your password?</span>
      <a href="/login" data-en=" Sign In" data-hi=" साइन इन करें"> Sign In</a>
    </div>
  </div>
</div>

<script>
// ── THEME ──────────────────────────────────────────────────────────────
let isDark = localStorage.getItem('ova-theme') === 'dark';
function applyTheme() {
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
}
function toggleTheme() {
  isDark = !isDark;
  localStorage.setItem('ova-theme', isDark ? 'dark' : 'light');
  applyTheme();
}
applyTheme();

// ── LANGUAGE ───────────────────────────────────────────────────────────
function setLang(lang) {
  localStorage.setItem('ova-lang', lang);
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-hi').classList.toggle('active', lang === 'hi');

  document.querySelectorAll('[data-en]').forEach(function(el) {
    var val = el.getAttribute('data-' + lang);
    if (!val) return;
    if (el.tagName === 'BUTTON') el.textContent = val;
    else el.innerHTML = val;
  });

  document.querySelectorAll('[data-ph-en]').forEach(function(el) {
    var ph = el.getAttribute('data-ph-' + lang);
    if (ph) el.placeholder = ph;
  });
}

setLang(localStorage.getItem('ova-lang') || 'en');
</script>
</body>
</html>
